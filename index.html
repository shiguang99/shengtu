<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 图像生成器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier New', monospace;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #2a2a2a;
    padding-bottom: 14px;
    margin-bottom: 18px;
  }
  .header h1 { font-size: 20px; color: #f5c842; flex: 1; }
  .header span { font-size: 24px; }

  .card {
    background: #141414;
    border: 1px solid #252525;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  label {
    display: block;
    font-size: 11px;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
    margin-top: 12px;
  }
  label:first-of-type { margin-top: 0; }

  input, select, textarea {
    width: 100%;
    background: #1c1c1c;
    border: 1px solid #2e2e2e;
    border-radius: 7px;
    padding: 9px 12px;
    color: #e0e0e0;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #f5c842;
  }
  textarea { resize: vertical; line-height: 1.6; }

  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }

  .hint {
    font-size: 11px;
    color: #555;
    margin-top: 5px;
    line-height: 1.5;
  }

  .gen-btn {
    width: 100%;
    margin-top: 14px;
    background: #f5c842;
    color: #000;
    border: none;
    border-radius: 9px;
    padding: 13px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
    font-family: inherit;
    transition: opacity 0.2s, transform 0.1s;
  }
  .gen-btn:hover { opacity: 0.9; }
  .gen-btn:active { transform: scale(0.98); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    border-radius: 9px;
    padding: 11px 14px;
    font-size: 13px;
    line-height: 1.7;
    margin-bottom: 14px;
    display: none;
    word-break: break-all;
  }
  .status.error   { background: #1e0e0e; border: 1px solid #cc3333; display: block; }
  .status.success { background: #0e1e0e; border: 1px solid #33aa55; display: block; }
  .status.info    { background: #0e0e1e; border: 1px solid #3355cc; display: block; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    margin-top: 4px;
  }

  .img-card {
    background: #141414;
    border: 1px solid #252525;
    border-radius: 12px;
    overflow: hidden;
  }
  .img-card img { width: 100%; display: block; }

  .img-actions {
    display: flex;
    gap: 0;
    border-top: 1px solid #252525;
  }
  .img-actions button {
    flex: 1;
    background: transparent;
    border: none;
    color: #888;
    padding: 10px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: color 0.2s, background 0.2s;
  }
  .img-actions button:hover { background: #1e1e1e; color: #e0e0e0; }
  .img-actions button + button { border-left: 1px solid #252525; }

  .revised {
    font-size: 11px;
    color: #555;
    padding: 6px 12px;
    font-style: italic;
    line-height: 1.5;
  }

  .toggle-btn {
    background: transparent;
    border: 1px solid #333;
    color: #777;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    margin-left: auto;
  }

  .collapsible { transition: all 0.2s; }

  /* 历史记录 */
  .history-list { list-style: none; }
  .history-item {
    padding: 8px 10px;
    border-bottom: 1px solid #1e1e1e;
    font-size: 12px;
    color: #888;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-item:hover { background: #1a1a1a; color: #e0e0e0; }
  .history-item:last-child { border-bottom: none; }

  @media (max-width: 500px) {
    .row { flex-direction: column; }
    body { padding: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <span>⚡</span>
  <h1>AI 图像生成器</h1>
</div>

<!-- 设置卡片 -->
<div class="card" id="settings-card">
  <div style="display:flex;align-items:center;margin-bottom:12px;">
    <span class="section-title" style="margin:0;">⚙️ 接口设置</span>
    <button class="toggle-btn" onclick="toggleSettings()">收起 ▲</button>
  </div>
  <div id="settings-body">
    <label>API KEY</label>
    <input type="password" id="apiKey" placeholder="sk-..." />
    <p class="hint">保存在本页内存中，刷新后需重新填写。不会上传任何服务器。</p>

    <label>API 地址 (Base URL)</label>
    <input type="text" id="baseUrl" value="https://image.fushengyunsuan.cn/v1" />

    <label>模型名称</label>
    <input type="text" id="model" value="gpt-image-2" />

    <div class="row" style="margin-top:12px;">
      <div>
        <label>尺寸</label>
        <select id="size">
          <option value="1024x1024">1024×1024</option>
          <option value="1792x1024">1792×1024 (横)</option>
          <option value="1024x1792">1024×1792 (竖)</option>
        </select>
      </div>
      <div>
        <label>质量</label>
        <select id="quality">
          <option value="standard">标准</option>
          <option value="hd">高清 (HD)</option>
        </select>
      </div>
      <div>
        <label>数量</label>
        <select id="n">
          <option value="1">1 张</option>
          <option value="2">2 张</option>
          <option value="4">4 张</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- 提示词 -->
<div class="card">
  <label style="margin-top:0;">图像描述 (Prompt)</label>
  <textarea id="prompt" rows="4" placeholder="描述你想要生成的图像，英文效果更佳…&#10;例：A serene Japanese garden at sunset, studio ghibli style"></textarea>
  <button class="gen-btn" id="genBtn" onclick="generate()">✨ 生成图像</button>
</div>

<!-- 状态 -->
<div class="status" id="status"></div>

<!-- 结果 -->
<div class="gallery" id="gallery"></div>

<!-- 历史 -->
<div class="card" id="history-card" style="display:none;">
  <div style="display:flex;align-items:center;margin-bottom:10px;">
    <span class="section-title" style="margin:0;">🕓 最近 Prompt</span>
    <button class="toggle-btn" onclick="clearHistory()">清空</button>
  </div>
  <ul class="history-list" id="history-list"></ul>
</div>

<script>
  let settingsOpen = true;
  let history = JSON.parse(localStorage.getItem('img_history') || '[]');

  function toggleSettings() {
    settingsOpen = !settingsOpen;
    document.getElementById('settings-body').style.display = settingsOpen ? '' : 'none';
    document.querySelector('.toggle-btn').textContent = settingsOpen ? '收起 ▲' : '展开 ▼';
  }

  function setStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.textContent = (type === 'error' ? '❌ ' : type === 'success' ? '✅ ' : 'ℹ️ ') + msg;
  }

  function hideStatus() {
    document.getElementById('status').className = 'status';
  }

  function addToHistory(p) {
    history = [p, ...history.filter(x => x !== p)].slice(0, 10);
    try { localStorage.setItem('img_history', JSON.stringify(history)); } catch(e) {}
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    const card = document.getElementById('history-card');
    if (history.length === 0) { card.style.display = 'none'; return; }
    card.style.display = '';
    list.innerHTML = history.map(p =>
      `<li class="history-item" onclick="useHistory('${p.replace(/'/g,"\\'")}')">
        <span>${p.length > 50 ? p.slice(0,50)+'…' : p}</span>
        <span style="color:#444;font-size:10px;">↩</span>
      </li>`
    ).join('');
  }

  function useHistory(p) {
    document.getElementById('prompt').value = p;
    document.getElementById('prompt').focus();
  }

  function clearHistory() {
    history = [];
    try { localStorage.removeItem('img_history'); } catch(e) {}
    renderHistory();
  }

  async function generate() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const baseUrl = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
    const model   = document.getElementById('model').value.trim();
    const prompt  = document.getElementById('prompt').value.trim();
    const size    = document.getElementById('size').value;
    const quality = document.getElementById('quality').value;
    const n       = parseInt(document.getElementById('n').value);

    if (!apiKey) { setStatus('error', '请先填写 API Key'); return; }
    if (!prompt)  { setStatus('error', '请输入图像描述'); return; }

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 生成中…';
    setStatus('info', '正在请求 ' + baseUrl + '/images/generations …');
    document.getElementById('gallery').innerHTML = '';

    try {
      const res = await fetch(`${baseUrl}/images/generations`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({ model, prompt, n, size, quality, response_format: 'b64_json' })
      });

      const text = await res.text();
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { const j = JSON.parse(text); msg = j?.error?.message || j?.message || msg; } catch(e) {}
        setStatus('error', `生成失败：${msg}`);
        return;
      }

      const data = JSON.parse(text);
      const imgs = (data.data || []);
      if (imgs.length === 0) { setStatus('error', '接口返回数据为空'); return; }

      addToHistory(prompt);
      setStatus('success', `生成成功，共 ${imgs.length} 张`);

      const gallery = document.getElementById('gallery');
      imgs.forEach((item, i) => {
        const src = item.b64_json ? `data:image/png;base64,${item.b64_json}` : item.url;
        const card = document.createElement('div');
        card.className = 'img-card';
        card.innerHTML = `
          <img src="${src}" alt="generated-${i+1}" loading="lazy" />
          ${item.revised_prompt ? `<div class="revised">✏️ ${item.revised_prompt}</div>` : ''}
          <div class="img-actions">
            <button onclick="downloadImg('${src}', ${i+1})">⬇ 下载</button>
            <button onclick="copyPrompt('${prompt.replace(/'/g,"\\'")}')">📋 复制Prompt</button>
          </div>
        `;
        gallery.appendChild(card);
      });

    } catch(err) {
      if (err.message && err.message.toLowerCase().includes('fetch')) {
        setStatus('error',
          `网络错误（Failed to fetch）\n` +
          `可能原因：\n` +
          `① 该接口域名未开启 CORS 跨域支持\n` +
          `② 网络无法访问该地址\n` +
          `③ API Key 格式错误\n\n` +
          `建议：用电脑浏览器直接打开此 HTML 文件测试，或换用支持 CORS 的接口`
        );
      } else {
        setStatus('error', `未知错误：${err.message}`);
      }
    } finally {
      btn.disabled = false;
      btn.textContent = '✨ 生成图像';
    }
  }

  function downloadImg(src, idx) {
    const a = document.createElement('a');
    a.href = src;
    a.download = `ai-image-${idx}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function copyPrompt(p) {
    navigator.clipboard.writeText(p).then(() => alert('已复制 Prompt'));
  }

  // 键盘快捷键 Ctrl+Enter 生成
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generate();
  });

  // 初始化历史
  renderHistory();
</script>
</body>
</html>
